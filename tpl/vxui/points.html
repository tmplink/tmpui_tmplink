                        <span class="vx-points-tab-option-main" data-tpl="nav_points_mall">点数商城</span>

                    <button type="button" class="vx-points-tab-option" data-tab="orders" onclick="event.stopPropagation(); VX_POINTS.selectTabFromMenu('orders')">

                <span class="vx-points-tab-trigger-label" data-points-current-label>概要</span>

            <div class="vx-points-tab-menu vx-points-tab-menu-desktop" id="vx-points-header-tab-menu" data-menu-source="desktop">
                <button type="button" class="vx-points-tab-option" data-tab="summary" onclick="event.stopPropagation(); VX_POINTS.selectTabFromMenu('summary')">
                    <iconpark-icon name="chart-line"></iconpark-icon>
                    <span class="vx-points-tab-option-main" data-tpl="nav_points_overview">概要</span>
                </button>
                <button type="button" class="vx-points-tab-option" data-tab="selling" onclick="event.stopPropagation(); VX_POINTS.selectTabFromMenu('selling')">
                    <iconpark-icon name="list-check"></iconpark-icon>
                    <span class="vx-points-tab-option-main" data-tpl="nav_points_sold">出售文件</span>
                </button>
                <button type="button" class="vx-points-tab-option" data-tab="mall" onclick="event.stopPropagation(); VX_POINTS.selectTabFromMenu('mall')">
                    <iconpark-icon name="bag-shopping"></iconpark-icon>
                    <span class="vx-points-tab-option-main" data-tpl="nav_points_mall">点数商城</span>

                <button type="button" class="vx-points-tab-option" data-tab="orders" onclick="event.stopPropagation(); VX_POINTS.selectTabFromMenu('orders')">
                    <iconpark-icon name="list-check"></iconpark-icon>
                    <span class="vx-points-tab-option-main" data-tpl="vx_mall_my_orders">兑换记录</span>

        <button class="vx-btn-icon" onclick="VX_POINTS.refresh()" data-title-tpl="vx_refresh" title="刷新">

</header>

<div class="vx-content vx-points-content">
    <div class="vx-points-tab-content" id="vx-points-summary">
        <div class="vx-points-summary-shell">
            <section class="vx-points-balance-panel">
                <div class="vx-points-balance-label" data-tpl="vx_profile_points">点数余额</div>
                <div class="vx-points-balance-value" id="vx-points-balance">--</div>
            </section>

            <section class="vx-points-actions-panel">

                    <span data-tpl="vx_point_recharge_action">充值点数</span>
                </button>
                <button class="vx-points-quick-btn vx-points-quick-transfer" onclick="VX_POINTS.openPointTransfer()">

                    <span data-tpl="vx_point_transfer_action">点数转账</span>
                </button>
            </section>

            <section class="vx-points-log-section">
                <div class="vx-points-log-header" data-tpl="vx_point_log_title">变动记录</div>

                        <div class="vx-spinner"></div>
                        <span data-tpl="vx_loading">加载中...</span>
                    </div>

    <div class="vx-points-tab-content vx-points-tab-selling" id="vx-points-selling" style="display:none;">

                    <span data-tpl="filename">文件名</span>
                </div>
                <div class="vx-list-col vx-list-col-size">
                    <span data-tpl="filesize">大小</span>
                </div>
                <div class="vx-list-col vx-list-col-date vx-hide-mobile">
                    <span data-tpl="filedate">日期</span>
                </div>
                <div class="vx-list-col vx-list-col-actions">
                    <span data-tpl="actions">操作</span>
                </div>
            </div>
            <div class="vx-list-body" id="vx-points-selling-body">

                        <div class="vx-skeleton-bone vx-skeleton-icon"></div>
                        <div class="vx-skeleton-bone vx-skeleton-text" style="width: 58%"></div>
                        <div class="vx-skeleton-bone vx-skeleton-text-sm"></div>
                        <div class="vx-skeleton-bone vx-skeleton-text-date"></div>
                        <div class="vx-skeleton-bone" style="width: 64px;"></div>
                    </div>
                    <div class="vx-skeleton-row">
                        <div class="vx-skeleton-bone vx-skeleton-icon"></div>
                        <div class="vx-skeleton-bone vx-skeleton-text" style="width: 45%"></div>
                        <div class="vx-skeleton-bone vx-skeleton-text-sm"></div>
                        <div class="vx-skeleton-bone vx-skeleton-text-date"></div>
                        <div class="vx-skeleton-bone" style="width: 64px;"></div>
                    </div>
                    <div class="vx-skeleton-row">
                        <div class="vx-skeleton-bone vx-skeleton-icon"></div>
                        <div class="vx-skeleton-bone vx-skeleton-text" style="width: 66%"></div>
                        <div class="vx-skeleton-bone vx-skeleton-text-sm"></div>
                        <div class="vx-skeleton-bone vx-skeleton-text-date"></div>
                        <div class="vx-skeleton-bone" style="width: 64px;"></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="vx-points-selling-pagination"></div>
    </div>

    <div class="vx-points-tab-content" id="vx-points-mall" style="display:none;">
        <div class="vx-shop-section">
            <div id="vx-mall-products"></div>
        </div>
    </div>

    <div class="vx-points-tab-content" id="vx-points-orders" style="display:none;">
        <div class="vx-shop-section">
            <div id="vx-mall-orders"></div>
        </div>
    </div>
</div>

<div class="vx-modal" id="vx-points-modal">
    <div class="vx-modal-overlay" onclick="VX_POINTS.closeModal()"></div>
    <div class="vx-modal-container vx-modal-lg">
        <div class="vx-modal-header">
            <h3 class="vx-modal-title" id="vx-points-modal-title">点数</h3>
            <button class="vx-modal-close" onclick="VX_POINTS.closeModal()">
                <iconpark-icon name="circle-xmark"></iconpark-icon>
            </button>
        </div>
        <div class="vx-modal-body" id="vx-points-modal-body"></div>

<style>
.vx-header-points {
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 8px 20px;
    background: var(--vx-surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--vx-border);
}

/* Selling tab: fill available space like filelist */
.vx-points-tab-selling {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.vx-points-tab-selling .vx-list-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.vx-points-tab-selling .vx-list-body {
    flex: 1;
    overflow-y: auto;
    min-height: 220px;
}

.vx-points-tab-selling #vx-points-selling-pagination {
    flex-shrink: 0;
}

.vx-points-tab-selling .vx-list-body .vx-orders-empty {
    min-height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--vx-text-secondary);
    text-align: center;
}

.vx-points-tab-selling .vx-list-body .vx-orders-empty p {
    margin: 0;
    font-size: 14px;
    color: var(--vx-text-muted);
}

.vx-header-points .vx-page-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 600;
    margin: 0;
}

.vx-header-points .vx-page-title iconpark-icon {
    font-size: 22px;
    color: var(--vx-primary);
}

.vx-points-tab-menu-anchor {
    position: relative;
}

.vx-points-tab-menu-anchor-desktop {
    display: none;
}

.vx-points-tab-trigger {
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.vx-points-tab-trigger iconpark-icon {
    flex-shrink: 0;
}

.vx-points-tab-trigger-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.vx-points-tab-trigger-desktop {
    min-width: 126px;
    justify-content: space-between;
}

.vx-points-tab-trigger-mobile {
    width: auto;
    max-width: 136px;
    padding: 0 14px;
    border-radius: 16px;
    gap: 6px;
    color: var(--vx-text);
}

.vx-points-tab-menu {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    display: none;
    width: 240px;
    padding: 8px;
    background: var(--vx-surface);
    border: 1px solid var(--vx-border);
    border-radius: 18px;
    box-shadow: 0 18px 44px rgba(15, 23, 42, 0.16);
    z-index: calc(var(--vx-z-sticky) + 3);
}

.vx-points-tab-menu.is-open {
    display: block;
}

.vx-points-tab-option {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border: 0;
    border-radius: 14px;
    background: transparent;
    color: var(--vx-text);
    font-size: 14px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    transition: var(--vx-transition-fast);
}

.vx-points-tab-option iconpark-icon {
    font-size: 18px;
    color: var(--vx-text-secondary);
    flex-shrink: 0;
}

.vx-points-tab-option-main {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.vx-points-tab-option:hover {
    background: var(--vx-surface-hover);
}

.vx-points-tab-option.active {
    background: rgba(var(--vx-primary-rgb), 0.1);
    color: var(--vx-primary);
}

.vx-points-tab-option.active iconpark-icon {
    color: var(--vx-primary);
}

.vx-points-content {
    padding: 20px;
}

@media (min-width: 1024px) {
    .vx-points-content {
        padding: 24px 32px;
    }
}

@media (min-width: 1440px) {
    .vx-points-content {
        padding: 24px 48px;
    }
}

.vx-points-content.vx-points-content-selling {
    padding: 0;
}

.vx-points-summary-shell {
    max-width: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.vx-points-balance-panel,
.vx-points-actions-panel,
.vx-points-log-section {
    background: var(--vx-surface);
    border: 1px solid var(--vx-border);
    border-radius: var(--vx-radius-lg);
    box-shadow: var(--vx-shadow-sm);
}

.vx-points-balance-panel {
    padding: 26px 20px;
    text-align: center;
}

.vx-points-balance-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--vx-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
}

.vx-points-balance-value {
    font-size: 44px;
    font-weight: 800;
    color: var(--vx-text);
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
}

.vx-points-actions-panel {
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
}

.vx-points-quick-btn {
    width: 100%;
    min-height: 46px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: var(--vx-radius-md);
    border: 1px solid transparent;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
}

.vx-points-quick-btn iconpark-icon {
    font-size: 18px;
}

.vx-points-quick-recharge {
    background: var(--vx-primary);
    color: var(--vx-surface);
}

.vx-points-quick-recharge:hover {
    filter: brightness(1.05);
}

.vx-points-quick-transfer {
    background: var(--vx-bg-secondary);
    color: var(--vx-text);
    border-color: var(--vx-border);
}

.vx-points-quick-transfer:hover {
    border-color: var(--vx-primary);
    color: var(--vx-primary);
    background: var(--vx-surface-hover);
}

.vx-points-log-section {
    padding: 14px;
}

.vx-points-log-header {
    font-size: 14px;
    font-weight: 700;
    color: var(--vx-text);
    margin-bottom: 10px;
    padding: 0 2px 10px;
    border-bottom: 1px solid var(--vx-border);
}

.vx-point-log-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 8px;
    border-bottom: 1px solid var(--vx-border);
}

.vx-point-log-item:last-child,
.vx-point-log-item:last-of-type {
    border-bottom: none;
}

.vx-point-log-icon {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-radius: 50%;
    background: var(--vx-bg-secondary);
    font-size: 19px;
}

.vx-point-log-icon-income {
    color: var(--vx-success);
}

.vx-point-log-icon-expense {
    color: var(--vx-danger);
}

.vx-point-log-info {
    flex: 1;
    min-width: 0;
}

.vx-point-log-action {
    font-size: 14px;
    font-weight: 600;
    color: var(--vx-text);
    margin-bottom: 2px;
}

.vx-point-log-content {
    font-size: 12px;
    color: var(--vx-text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.vx-point-log-time {
    font-size: 12px;
    color: var(--vx-text-muted);
    margin-top: 2px;
}

.vx-point-log-amount {
    text-align: right;
    flex-shrink: 0;
}

.vx-point-income {
    font-size: 16px;
    font-weight: 700;
    color: var(--vx-success);
}

.vx-point-expense {
    font-size: 16px;
    font-weight: 700;
    color: var(--vx-danger);
}

.vx-point-log-balance {
    font-size: 11px;
    color: var(--vx-text-muted);
    margin-top: 2px;
}

.vx-point-pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px 0;
    font-size: 14px;
    color: var(--vx-text-secondary);
}

}

.vx-price-tag {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    padding: 1px 7px;
    background: linear-gradient(135deg, rgba(217,160,35,0.15), rgba(251,191,36,0.1));
    color: #b8860b;
    border: 1px solid rgba(217,160,35,0.35);
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    margin-left: 4px;
    vertical-align: middle;
    letter-spacing: 0.2px;
}

.vx-price-tag iconpark-icon {
    font-size: 11px;
}

@media (prefers-color-scheme: dark) {
    .vx-price-tag {
        color: #f5c842;
        background: linear-gradient(135deg, rgba(245,200,66,0.18), rgba(251,191,36,0.1));
        border-color: rgba(245,200,66,0.3);
    }
}

.vx-points-coming-soon {
    border: 1px dashed var(--vx-border);
    border-radius: var(--vx-radius-lg);
    padding: 28px;
    text-align: center;
    background: var(--vx-bg-secondary);
}

.vx-points-coming-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--vx-text);
    margin-bottom: 6px;
}

.vx-points-coming-desc {
    font-size: 14px;
    color: var(--vx-text-secondary);
}

/* === Points Mall === */
.vx-mall-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 4px 0 20px;
}

.vx-mall-card {
    background: var(--vx-surface);
    border: 1px solid var(--vx-border);
    border-radius: var(--vx-radius-lg);
    overflow: hidden;
    transition: box-shadow 0.2s ease;
}

.vx-mall-card:hover {
    box-shadow: var(--vx-shadow-md);
}

.vx-mall-card-image {
    position: relative;
    width: 100%;
    overflow: hidden;
}

.vx-mall-card-image img {
    width: 100%;
    height: auto;
    display: block;
}

.vx-mall-sold-out-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.52);
    display: flex;
    align-items: center;
    justify-content: center;
}

.vx-mall-sold-out-badge {
    background: rgba(255, 255, 255, 0.95);
    color: #e53935;
    font-size: 15px;
    font-weight: 700;
    padding: 8px 22px;
    border-radius: 20px;
    letter-spacing: 1.5px;
