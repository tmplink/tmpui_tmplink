<!-- Header -->

<!-- Content -->
<div class="vx-content vx-shop-content vx-account-content">

        <div class="vx-spinner vx-spinner-lg"></div>
    </div>
    
    <!-- Products Tab -->
    <div class="vx-shop-tab-content" id="vx-shop-products">
        <!-- First Time Sponsor Special -->
        <div class="vx-shop-section" id="vx-shop-special" style="display: none;">
            <div class="vx-shop-card vx-shop-card-gold" onclick="VX_SHOP.buyFirstTimeSponsor()">
                <div class="vx-shop-card-icon">
                    <iconpark-icon name="circle-heart"></iconpark-icon>
                </div>
                <div class="vx-shop-card-content">
                    <h3 class="vx-shop-card-title" data-tpl="first_time_sponsor_title">初次赞助特典</h3>
                    <p class="vx-shop-card-desc" data-tpl="first_time_sponsor_subtitle">第一次成为赞助者？一年仅需 3600 点数！</p>
                    <p class="vx-shop-card-note" data-tpl="first_time_sponsor_description">每位用户限一次！</p>
                </div>
                <div class="vx-shop-card-arrow">
                    <iconpark-icon name="arrow-right"></iconpark-icon>
                </div>
            </div>
        </div>
        
        <!-- Regular Products -->
        <div class="vx-shop-section vx-shop-section-centered">
            <!-- Sponsor -->
            <div class="vx-shop-card" onclick="VX_SHOP.openSponsor()">
                <div class="vx-shop-card-icon vx-icon-sponsor">
                    <iconpark-icon name="heart-circle-plus"></iconpark-icon>
                </div>
                <div class="vx-shop-card-content">
                    <h3 class="vx-shop-card-title" data-tpl="model_title_sponsor">成为赞助者</h3>
                    <p class="vx-shop-card-desc" data-tpl="model_des_sponsor">获得高速通道、蓝标认证、媒体播放等特权</p>
                </div>
                <div class="vx-shop-card-arrow">
                    <iconpark-icon name="arrow-right"></iconpark-icon>
                </div>
            </div>

            <!-- Sponsor Exchange (Share Value) -->
            <div class="vx-shop-card" onclick="VX_SHOP.exchangeSponsorByShare()">
                <div class="vx-shop-card-icon vx-icon-sponsor-exchange">
                    <iconpark-icon name="circle-heart"></iconpark-icon>
                </div>
                <div class="vx-shop-card-content">
                    <h3 class="vx-shop-card-title" data-tpl="sponsor_exchange_title">成为赞助者（分享值兑换）</h3>
                    <p class="vx-shop-card-desc" data-tpl="sponsor_exchange_desc">使用分享值兑换赞助者权益，每月可兑换一次！</p>
                </div>
                <div class="vx-shop-card-arrow">
                    <iconpark-icon name="arrow-right"></iconpark-icon>
                </div>
            </div>
            
            <!-- Storage -->
            <div class="vx-shop-card" onclick="VX_SHOP.openStorage()">
                <div class="vx-shop-card-icon vx-icon-storage">
                    <iconpark-icon name="album-circle-plus"></iconpark-icon>
                </div>
                <div class="vx-shop-card-content">
                    <h3 class="vx-shop-card-title" data-tpl="model_title_buy_storage">私有空间</h3>
                    <p class="vx-shop-card-desc" data-tpl="storage_content">扩展您的私有存储空间</p>
                </div>
                <div class="vx-shop-card-arrow">
                    <iconpark-icon name="arrow-right"></iconpark-icon>
                </div>
            </div>
            
            <!-- Direct Quota -->
            <div class="vx-shop-card" id="vx-shop-direct" onclick="VX_SHOP.openQuota()">
                <div class="vx-shop-card-icon vx-icon-direct">
                    <iconpark-icon name="share-nodes"></iconpark-icon>
                </div>
                <div class="vx-shop-card-content">
                    <h3 class="vx-shop-card-title" data-tpl="model_title_buy_direct_quota">优先配额（直链）</h3>
                    <p class="vx-shop-card-desc" data-tpl="direct_quota_content">获得更多直链配额</p>
                </div>
                <div class="vx-shop-card-arrow">
                    <iconpark-icon name="arrow-right"></iconpark-icon>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Purchased Tab -->
    <div class="vx-shop-tab-content" id="vx-shop-purchased" style="display: none;">
        <div class="vx-shop-section vx-shop-section-centered">
            <!-- Order List -->
            <div class="vx-orders-list" id="vx-orders-list">
                <div class="vx-orders-loading">
                    <div class="vx-spinner"></div>
                    <span data-tpl="vx_orders_loading">加载订单中...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Spaces Management Tab -->
    <div class="vx-shop-tab-content" id="vx-shop-spaces" style="display: none;">
        <div class="vx-shop-section">
            <!-- My Spaces Section -->
            <div class="vx-spaces-my-section">
                <div class="vx-spaces-actions">
                    <button class="vx-btn vx-btn-sm vx-btn-secondary" id="vx-space-renew-all-btn"
                        onclick="VX_SHOP.openBulkRenewModal()" style="display:none;">
                        <iconpark-icon name="rotate"></iconpark-icon>
                        <span data-tpl="vx_space_renew_all">一键续费所有</span>
                    </button>
                    <button class="vx-btn vx-btn-sm vx-btn-primary" id="vx-space-buy-trigger"
                        onclick="VX_SHOP.openStorage('256g')">
                        <iconpark-icon name="album-circle-plus"></iconpark-icon>
                        <span data-tpl="vx_space_buy_btn">购买</span>
                    </button>
                </div>
                <div id="vx-space-overview" class="vx-space-overview" style="display:none;"></div>
                <div id="vx-spaces-list-v2" class="vx-spaces-list-v2"></div>
            </div>
        </div>
    </div>

</div>

<!-- Purchase Modal -->
<div class="vx-modal" id="vx-shop-modal">
    <div class="vx-modal-overlay" onclick="VX_SHOP.closeModal()"></div>
    <div class="vx-modal-container vx-modal-lg">
        <div class="vx-modal-header">
            <h3 class="vx-modal-title" id="vx-modal-title">购买</h3>
            <button class="vx-modal-close" onclick="VX_SHOP.closeModal()">
                <iconpark-icon name="circle-xmark"></iconpark-icon>
            </button>
        </div>
        <div class="vx-modal-body" id="vx-modal-body">
            <!-- Dynamic content -->
        </div>
        <div class="vx-modal-footer">

                <span class="vx-price-label" data-tpl="payment_total">合计：</span>
                <span class="vx-price-unit-display" id="vx-modal-unit">¥</span>
                <span class="vx-price-total" id="vx-modal-total">0</span>
            </div>
            <div class="vx-modal-actions">
                <button class="vx-btn vx-btn-secondary" onclick="VX_SHOP.closeModal()" data-tpl="model_btn_cancel">取消</button>
                <button class="vx-btn vx-btn-primary" onclick="VX_SHOP.makeOrder()" data-tpl="model_buy_btn">立即购买</button>
            </div>
        </div>
    </div>
</div>

<style>
/* Shop Module Styles */

/* ===== Private Space Management ===== */
.vx-spaces-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    color: var(--vx-text);
    margin: 0 0 8px;
}

.vx-spaces-header iconpark-icon {
    font-size: 18px;
    color: var(--vx-primary);
}

.vx-spaces-header-desc {
    font-size: 13px;
    color: var(--vx-text-secondary);
    margin: 0 0 16px;
}

.vx-space-exceed-warning {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: 8px;
    color: var(--vx-danger, #ef4444);
    font-size: 13px;
}

.vx-spaces-my-section {
    /* container */
}

.vx-spaces-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 16px;
}

#vx-space-buy-trigger[disabled] {
    opacity: 0.45;
    cursor: not-allowed;
}

.vx-space-overview {
    margin-bottom: 14px;
}

.vx-space-overview-card {
    padding: 14px;
    background: var(--vx-surface);
    border: 1px solid var(--vx-border);
    border-radius: var(--vx-radius-lg);
}

.vx-space-overview-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
}

.vx-space-overview-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--vx-text);
}

.vx-space-overview-cap {
    font-size: 12px;
    color: var(--vx-text-secondary);
}

.vx-space-kpis {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 12px;
}

.vx-space-kpi {
    padding: 10px 10px 9px;
    border: 1px solid var(--vx-border);
    border-radius: var(--vx-radius-md);
    background: var(--vx-bg-secondary);
}

.vx-space-kpi-label {
    font-size: 12px;
    color: var(--vx-text-secondary);
    margin-bottom: 4px;
}

.vx-space-kpi-value {
    font-size: 15px;
    font-weight: 700;
    color: var(--vx-text);
}

.vx-space-section-title {
    font-size: 12px;
    color: var(--vx-text-secondary);
    margin-bottom: 6px;
}

.vx-space-comp-bar,
.vx-space-used-bar {
    display: flex;
    width: 100%;
    height: 10px;
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--vx-border);
    background: var(--vx-bg-secondary);
}

.vx-space-comp-seg {
    height: 100%;
    min-width: 0;
}

.vx-space-comp-legend {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px 10px;
    margin-top: 8px;
    margin-bottom: 12px;
}

.vx-space-comp-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 12px;
    min-width: 0;
}

.vx-space-comp-left {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
}

.vx-space-comp-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
}

.vx-space-comp-name {
    color: var(--vx-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.vx-space-comp-val {
    color: var(--vx-text-secondary);
    flex-shrink: 0;
}

.vx-space-used-fill {
    height: 100%;
    background: linear-gradient(135deg, #22c55e, #16a34a);
}

.vx-space-used-meta {
    margin-top: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--vx-text-secondary);
}

.vx-spaces-list-v2 {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.vx-space-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    background: var(--vx-surface);
    border: 1px solid var(--vx-border);
    border-radius: var(--vx-radius-lg);
}

.vx-space-card-icon {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    border-radius: var(--vx-radius-md);
    flex-shrink: 0;
}

.vx-space-card-icon iconpark-icon {
    font-size: 22px;
    color: white;
}

.vx-space-card-icon.vx-space-icon-expired {
    background: var(--vx-surface-hover);
}

.vx-space-card-icon.vx-space-icon-expired iconpark-icon {
    color: var(--vx-text-muted);
}

.vx-space-card-info {
    flex: 1;
    min-width: 0;
}

.vx-space-card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
}

.vx-space-card-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--vx-text);
}

.vx-space-status-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
}

.vx-space-status-active {
    background: rgba(34, 197, 94, 0.12);
    color: #16a34a;
}

.vx-space-status-expired {
    background: rgba(239, 68, 68, 0.1);
    color: #dc2626;
}

.vx-space-card-expiry {
    font-size: 13px;
    color: var(--vx-text-secondary);
}

.vx-space-card-renew-price {
    font-size: 12px;
    color: var(--vx-text-muted);
    margin-top: 2px;
}

.vx-space-card-action {
    flex-shrink: 0;
}

.vx-space-slider-wrap {
    margin-bottom: 14px;
    padding: 10px 12px 12px;
    border: 1px solid var(--vx-border);
    border-radius: var(--vx-radius-md);
    background: var(--vx-bg-secondary);
}

.vx-space-slider-head {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--vx-text-secondary);
}

.vx-space-slider-head strong {
    color: var(--vx-primary);
    font-size: 14px;
    font-weight: 700;
}

.vx-space-slider {
    display: block;
    width: 100%;
    height: 8px;
    min-height: 8px;
    border: 0;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    /* Real-time progress + neutral rail */
    background:
        linear-gradient(var(--vx-primary), var(--vx-primary)) 0 / var(--vx-slider-pct, 0%) 100% no-repeat,
        var(--vx-surface);
    border: 1px solid var(--vx-border);
    border-radius: 99px;
    margin: 0;
    transition: background-size 0.12s ease;
}

.vx-space-slider::-webkit-slider-runnable-track {
    height: 8px;
    background: transparent;
    border: 0;
}

.vx-space-slider::-webkit-slider-thumb {
    appearance: none;
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid #ffffff;
    background: var(--vx-primary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.18), 0 2px 6px rgba(0, 0, 0, 0.22);
    cursor: pointer;
    margin-top: -5px;
}

.vx-space-slider::-moz-range-track {
    height: 8px;
    border-radius: 99px;
    background: transparent;
    border: 0;
}

.vx-space-slider::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid #ffffff;
    background: var(--vx-primary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.18), 0 2px 6px rgba(0, 0, 0, 0.22);
    cursor: pointer;
}

.vx-space-slider::-moz-focus-outer {
    border: 0;
}

.vx-space-calc-box {
    margin: 14px 0 16px;
    border: 1px solid var(--vx-border);
    border-radius: var(--vx-radius-md);
    background: var(--vx-bg-secondary);
    padding: 10px 12px;
}

.vx-space-calc-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--vx-text-secondary);
    padding: 3px 0;
}

.vx-space-calc-item span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.vx-space-calc-item iconpark-icon,
.vx-section-title iconpark-icon {
    font-size: 15px;
    color: var(--vx-primary);
}

.vx-space-calc-item strong {
    color: var(--vx-text);
    font-weight: 700;
}

.vx-spaces-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: var(--vx-text-muted);
    gap: 12px;
    text-align: center;
}

.vx-spaces-empty iconpark-icon {
    font-size: 48px;
}

/* Renew modal months selector */
.vx-renew-months-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
}

.vx-renew-month-opt {
    flex: 1;
    min-width: 80px;
    padding: 10px 8px;
    background: var(--vx-bg-secondary);
    border: 2px solid transparent;
    border-radius: var(--vx-radius-md);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s ease;
}

.vx-renew-month-opt:hover,
.vx-renew-month-opt.selected {
    border-color: var(--vx-primary);
    background: rgba(var(--vx-primary-rgb), 0.08);
    color: var(--vx-primary);
}

.vx-renew-month-opt-num {
    font-size: 16px;
    font-weight: 700;
    color: var(--vx-text);
    line-height: 1.2;
}

.vx-renew-month-opt.selected .vx-renew-month-opt-num {
    color: var(--vx-primary);
}

.vx-renew-month-opt-price {
    font-size: 12px;
    color: var(--vx-text-secondary);
    margin-top: 2px;
}

.vx-renew-cost-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--vx-bg-secondary);
    border-radius: var(--vx-radius-md);
    margin-top: 4px;
}

.vx-renew-cost-label {
    font-size: 14px;
    color: var(--vx-text-secondary);
}

.vx-renew-cost-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--vx-primary);
}

.vx-renew-spaces-summary {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
    padding: 12px;
    background: var(--vx-bg-secondary);
    border-radius: var(--vx-radius-md);
}

.vx-renew-space-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--vx-text-secondary);
}

.vx-renew-space-item-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
    color: var(--vx-text);
}

.vx-renew-space-item-label iconpark-icon {
    font-size: 15px;
    color: var(--vx-primary);
    flex-shrink: 0;
}

.vx-renew-space-item-etime {
    font-weight: 400;
    font-size: 12px;
    color: var(--vx-text-secondary);
}

@media (max-width: 768px) {
    .vx-space-kpis {
        grid-template-columns: 1fr;
    }

    .vx-space-comp-legend {
        grid-template-columns: 1fr;
    }

    .vx-renew-months-options {
        gap: 6px;
    }

    .vx-renew-month-opt {
        min-width: 60px;
        padding: 8px 6px;
    }
}
/* ===== End Private Space Management ===== */

/* Point payment icon */
.vx-pay-point {
    background: linear-gradient(135deg, #16a34a, #15803d);
}
.vx-pay-point iconpark-icon {
    font-size: 14px;
    color: #fff;
}

/* File price tag in file list */
.vx-price-tag iconpark-icon {
    font-size: 11px;
}

.vx-unpurchased-tag {
    display: inline-block;
    padding: 1px 6px;
