<!-- FileList Module - Modern File Browser Template -->
<div class="filelist-container">
    <div class="fl-layout">
        <!-- Sidebar -->
        <aside class="fl-sidebar">
            <div class="fl-sidebar-header">
                <a href="javascript:;" class="fl-back-btn" onclick="FILELIST.goBack()" style="display: none;">
                    <iconpark-icon name="left-c"></iconpark-icon>
                    <span i18n="filelist_dir_parent">返回上级</span>
                </a>
                <div class="fl-folder-info">
                    <h1 class="fl-folder-name" id="fl-folder-name">文件</h1>
                    <div class="fl-folder-meta" id="fl-folder-stats" style="display: none;">
                        <span class="fl-folder-meta-item">
                            <iconpark-icon name="file"></iconpark-icon>
                            <span id="fl-file-count">0</span> <span i18n="filelist_files">个文件</span>
                        </span>
                        <span class="fl-folder-meta-item">
                            <iconpark-icon name="hard-drive"></iconpark-icon>
                            <span id="fl-total-size">0</span>
                        </span>
                    </div>
                </div>
            </div>
            
            <nav class="fl-sidebar-nav">
                <!-- 快捷操作 -->
                <div class="fl-nav-section">
                    <div class="fl-nav-title" i18n="filelist_quick_actions">快捷操作</div>
                    <div class="fl-nav-item" onclick="FileListActions.downloadAll(FILELIST.fileList);">
                        <iconpark-icon name="cloud-arrow-down"></iconpark-icon>
                        <span i18n="file_btn_downloadall">下载全部</span>
                    </div>
                    <div class="fl-nav-item" onclick="FILELIST.openPhotoAlbum();">
                        <iconpark-icon name="images"></iconpark-icon>
                        <span i18n="model_photo">相册模式</span>
                    </div>
                    <div class="fl-nav-item fl-not-desktop" onclick="FILELIST.shareFolder(FILELIST.mrid);" style="display: none;">
                        <iconpark-icon name="share-from-square"></iconpark-icon>
                        <span i18n="model_copy">分享链接</span>
                    </div>
                </div>
                
                <!-- 文件夹设置（仅所有者可见） -->
                <div class="fl-nav-section fl-owner-only fl-not-desktop" style="display: none;">
                    <div class="fl-nav-title" i18n="btn_performance">文件夹设置</div>
                    <div class="fl-nav-item" onclick="FILELIST.openFolderSettings(FILELIST.mrid);">
                        <iconpark-icon name="gear"></iconpark-icon>
                        <span i18n="modal_performance_title">偏好设置</span>
                    </div>
                </div>
            </nav>
            
            <div class="fl-sidebar-actions">
                <button class="fl-action-btn upload" id="fl-upload-btn" onclick="FILELIST.openUpload()" style="display: none;">
                    <iconpark-icon name="cloud-arrow-up"></iconpark-icon>
                    <span i18n="nav_upload">上传文件</span>
                </button>
                <button class="fl-action-btn primary fl-owner-only" id="fl-create-folder-btn" onclick="FILELIST.showCreateFolderModal();" style="display: none;">
                    <iconpark-icon name="folder-plus"></iconpark-icon>
                    <span i18n="model_title_folder_title">新建文件夹</span>
                </button>
                <button class="fl-action-btn secondary" onclick="FILELIST.refresh()">
                    <iconpark-icon name="rotate"></iconpark-icon>
                    <span i18n="album_refresh">刷新</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="fl-main">
            <!-- Mobile Header -->
            <div class="fl-mobile-header">
                <button class="fl-icon-btn" id="fl-mobile-back-btn" onclick="FILELIST.goBack()" style="display: none;">
                    <iconpark-icon name="left-c"></iconpark-icon>
                </button>
                <span class="fl-mobile-title" id="fl-mobile-title">文件</span>
                <button class="fl-icon-btn" onclick="FILELIST.toggleSidebar()">
                    <iconpark-icon name="ellipsis"></iconpark-icon>
                </button>
            </div>
            
            <!-- Desktop Header -->
            <header class="fl-header">
                <div class="fl-header-left">
                    <div class="fl-breadcrumb" id="fl-breadcrumb">
                        <!-- Breadcrumb will be inserted here -->
                    </div>
                </div>
                
                <div class="fl-header-right">
                    <div class="fl-search">
                        <iconpark-icon name="search" class="fl-search-icon"></iconpark-icon>
                        <input type="text" class="fl-search-input" id="fl-search-input" 
                               placeholder="搜索文件..." i18n="search_plh"
                               onkeyup="if(event.keyCode==13)FILELIST.search();">
                    </div>
                    
                    <div class="fl-view-controls">
                        <button class="fl-view-btn active" onclick="FILELIST.setViewMode('list')" id="fl-view-list" title="列表视图">
                            <iconpark-icon name="list-radio"></iconpark-icon>
                        </button>
                        <button class="fl-view-btn" onclick="FILELIST.setViewMode('grid')" id="fl-view-grid" title="网格视图">
                            <iconpark-icon name="apps"></iconpark-icon>
                        </button>
                    </div>
                    
                    <button class="fl-icon-btn" onclick="FileListSelect.selectAll()" id="fl-select-all-btn" title="全选">
                        <iconpark-icon name="check-square"></iconpark-icon>
                    </button>
                    
                    <button class="fl-icon-btn fl-needs-selection" onclick="FileListSelect.clear()" id="fl-select-none-btn" title="取消选择" style="display: none;">
                        <iconpark-icon name="x-square"></iconpark-icon>
                    </button>
                    
                    <button class="fl-icon-btn" onclick="FILELIST.showSortModal()" title="排序">
                        <iconpark-icon name="list"></iconpark-icon>
                    </button>
                    
                    <button class="fl-icon-btn" onclick="FILELIST.openPhotoAlbum()" title="相册模式">
                        <iconpark-icon name="images"></iconpark-icon>
                    </button>
                    
                    <button class="fl-icon-btn fl-owner-only fl-not-desktop" onclick="FILELIST.openFolderSettings(FILELIST.mrid)" title="设置" style="display: none;">
                        <iconpark-icon name="gear"></iconpark-icon>
                    </button>
                    
                    <button class="fl-icon-btn fl-not-desktop fl-public-only" onclick="FILELIST.shareFolder(FILELIST.mrid)" title="分享" style="display: none;">
                        <iconpark-icon name="share-from-square"></iconpark-icon>
                    </button>
                    
                    <button class="fl-icon-btn" onclick="FILELIST.refresh()" title="刷新">
                        <iconpark-icon name="rotate"></iconpark-icon>
                    </button>
                </div>
            </header>
            
            <!-- Content Area -->
            <div class="fl-content">
                <!-- List View -->
                <div id="fl-list-view">
                    <div class="fl-list-header">
                        <div class="fl-list-header-item">
                            <div class="fl-checkbox" onclick="FILELIST.selectAll()">
                                <iconpark-icon name="check"></iconpark-icon>
                            </div>
                        </div>
                        <div class="fl-list-header-item sortable" onclick="FILELIST.setSort('name', FILELIST.sortBy==='name' && FILELIST.sortType==='asc' ? 'desc' : 'asc')">
                            <span i18n="sort_by_name">名称</span>
                        </div>
                        <div class="fl-list-header-item sortable" onclick="FILELIST.setSort('size', FILELIST.sortBy==='size' && FILELIST.sortType==='asc' ? 'desc' : 'asc')">
                            <span i18n="sort_by_size">大小</span>
                        </div>
                        <div class="fl-list-header-item sortable" onclick="FILELIST.setSort('time', FILELIST.sortBy==='time' && FILELIST.sortType==='asc' ? 'desc' : 'asc')">
                            <span i18n="sort_by_id">修改时间</span>
                        </div>
                        <div class="fl-list-header-item">
                            <span i18n="filelist_actions">操作</span>
                        </div>
                    </div>
                    <div class="fl-list" id="fl-file-list">
                        <!-- File rows will be inserted here -->
                    </div>
                </div>
                
                <!-- Grid View -->
                <div id="fl-grid-view" style="display: none;">
                    <div class="fl-grid" id="fl-grid-list">
                        <!-- Grid items will be inserted here -->
                    </div>
                </div>
                
                <!-- Loading State -->
                <div class="fl-loading" id="fl-loading" style="display: none;">
                    <div class="fl-spinner"></div>
                    <span class="fl-loading-text" i18n="album_loading">正在加载...</span>
                </div>
                
                <!-- Empty State -->
                <div class="fl-empty" id="fl-empty" style="display: none;">
                    <div class="fl-empty-icon">
                        <iconpark-icon name="folder-open"></iconpark-icon>
                    </div>
                    <h3 class="fl-empty-title" i18n="page_no_files">暂无文件</h3>
                    <p class="fl-empty-text" i18n="filelist_empty_hint">此文件夹为空</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Selection Bar -->
    <div class="fl-selection-bar" id="fl-selection-bar">
        <span class="fl-selection-count">
            <span id="fl-selection-count">0</span> <span i18n="album_selected">项已选择</span>
        </span>
        <div class="fl-selection-actions">
            <button class="fl-icon-btn" onclick="FILELIST.downloadSelected()" title="下载">
                <iconpark-icon name="cloud-arrow-down"></iconpark-icon>
            </button>
            <button class="fl-icon-btn" onclick="FILELIST.shareSelected()" title="分享">
                <iconpark-icon name="share-from-square"></iconpark-icon>
            </button>
            <button class="fl-icon-btn fl-owner-only" onclick="FILELIST.moveSelected()" title="移动">
                <iconpark-icon name="folder-plus"></iconpark-icon>
            </button>
            <button class="fl-icon-btn danger fl-owner-only" onclick="FILELIST.deleteSelected()" title="删除">
                <iconpark-icon name="trash"></iconpark-icon>
            </button>
            <button class="fl-icon-btn" onclick="FILELIST.selectNone()" title="取消选择">
                <iconpark-icon name="x-square"></iconpark-icon>
            </button>
        </div>
    </div>
    
    <!-- Mobile Bottom Bar -->
    <div class="fl-mobile-bar">
        <div class="fl-mobile-bar-inner">
            <button class="fl-mobile-btn" id="fl-upload-btn-mobile" onclick="FILELIST.openUpload()" style="display: none;">
                <iconpark-icon name="cloud-arrow-up"></iconpark-icon>
                <span i18n="nav_upload">上传</span>
            </button>
            <button class="fl-mobile-btn" onclick="FileListSelect.selectAll()">
                <iconpark-icon name="check-square"></iconpark-icon>
                <span i18n="on_select_all">全选</span>
            </button>
            <button class="fl-mobile-btn" onclick="FILELIST.showSortModal();">
                <iconpark-icon name="list"></iconpark-icon>
                <span i18n="sort_title">排序</span>
            </button>
            <button class="fl-mobile-btn" onclick="FILELIST.openPhotoAlbum();">
                <iconpark-icon name="images"></iconpark-icon>
                <span i18n="model_photo">相册</span>
            </button>
            <button class="fl-mobile-btn" onclick="FILELIST.refresh()">
                <iconpark-icon name="rotate"></iconpark-icon>
                <span i18n="album_refresh">刷新</span>
            </button>
        </div>
    </div>
    
    <!-- Context Menu -->
    <div class="fl-context-menu" id="fl-context-menu">
        <!-- Menu items will be inserted dynamically -->
    </div>
    
    <!-- Move Modal -->
    <div class="modal" id="fl-move-modal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header">
                    <h4 class="modal-title" i18n="on_select_move">移动到文件夹</h4>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="fl-folder-tree" class="fl-folder-tree">
                        <!-- Folder tree will be inserted here -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal" i18n="model_btn_cancel">取消</button>
                    <button type="button" class="btn btn-primary" i18n="model_btn_ok" onclick="FileListUI.confirmMove();">确定</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- FL Create Folder Modal -->
<div class="modal" id="fl-create-folder-modal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h4 class="modal-title" i18n="model_title_meetingroom_creat">新建文件夹</h4>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-info" i18n="model_meetingroom_create_notice">
                    请输入文件夹名称
                </div>
                <div class="form-group">
                    <label for="fl-create-folder-name" i18n="model_meetingroom_create_name">文件夹名称</label>
                    <input type="text" class="form-control" id="fl-create-folder-name"
                           i18n="model_meetingroom_create_name_placeholder" placeholder="请输入名称">
                </div>
                <div class="form-group">
                    <label for="fl-create-folder-type" i18n="modal_meetingroom_create_type">文件夹类型</label>
                    <select class="form-control" id="fl-create-folder-type">
                        <option value="private" i18n-only="html" i18n="modal_meetingroom_type1" selected>私有</option>
                        <option value="public" i18n-only="html" i18n="modal_meetingroom_type2">公开</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal" i18n="model_btn_cancel">取消</button>
                <button type="button" class="btn btn-primary" i18n="model_btn_ok" onclick="FileListUI.confirmCreateFolder();">确定</button>
            </div>
        </div>
    </div>
</div>

<!-- FL Sort Modal -->
<div class="modal" id="fl-sort-modal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h4 class="modal-title" i18n="sort_title">排序</h4>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label i18n="sort_title">排序方式</label>
                    <select class="form-control" id="fl-sort-by">
                        <option value="time" i18n-only="html" i18n="sort_by_id">时间</option>
                        <option value="name" i18n-only="html" i18n="sort_by_name">文件名</option>
                        <option value="size" i18n-only="html" i18n="sort_by_size">文件大小</option>
                        <option value="type" i18n-only="html" i18n="sort_by_type">文件类型</option>
                    </select>
                </div>
                <div class="form-group">
                    <label i18n="sort_type_label">排序方向</label>
                    <select class="form-control" id="fl-sort-type">
                        <option value="desc" i18n-only="html" i18n="sort_desc">倒序</option>
                        <option value="asc" i18n-only="html" i18n="sort_asc">顺序</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal" i18n="model_btn_cancel">取消</button>
                <button type="button" class="btn btn-primary" i18n="model_btn_ok" onclick="FileListUI.confirmSort();">确定</button>
            </div>
        </div>
    </div>
</div>

<!-- FL Folder Settings Modal -->
<div class="modal" id="fl-settings-modal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h4 class="modal-title" i18n="modal_performance_title">文件夹设置</h4>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <h5 i18n="modal_performance_sort">排序</h5>
                <div class="form-group">
                    <select class="form-control" id="fl-pf-sort-by">
                        <option value="0" i18n-only="html" i18n="sort_by_id">时间</option>
                        <option value="1" i18n-only="html" i18n="sort_by_name">文件名</option>
                        <option value="2" i18n-only="html" i18n="sort_by_size">文件大小</option>
                        <option value="3" i18n-only="html" i18n="sort_by_type">文件类型</option>
                    </select>
                </div>
                <div class="form-group">
                    <select class="form-control" id="fl-pf-sort-type">
                        <option value="0" i18n-only="html" i18n="sort_desc">倒序</option>
                        <option value="1" i18n-only="html" i18n="sort_asc">顺序</option>
                    </select>
                </div>
                <hr>
                <div class="fl-settings-private-only">
                    <h5 i18n="modal_performance_publish">允许被搜索</h5>
                    <label class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="fl-pf-publish">
                        <span class="form-check-label" i18n="modal_performance_publish_des">
                            启用后，其他用户可以通过搜索引擎找到此目录内的文件。
                        </span>
                    </label>
                </div>
                <div class="fl-settings-share">
                    <h5 i18n="modal_performance_share">协作上传</h5>
                    <label class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="fl-pf-allow-upload">
                        <span class="form-check-label" i18n="modal_performance_share_des">
                            允许其他用户向此文件夹上传文件。
                        </span>
                    </label>
                </div>
                <div class="fl-settings-direct">
                    <hr>
                    <h5 i18n="modal_performance_direct">直链</h5>
                    <div class="alert alert-warning" id="fl-pf-direct-notice">
                        <div>
                            <span i18n="modal_performance_direct_tip">如需使用直链功能，请前往直链管理页面设置。</span>
                        </div>
                        <button class="btn btn-primary mt-2 my-sm-0" onclick="app.open('/app&listview=direct');">
                            <iconpark-icon name="share-nodes" class="fa-fw"></iconpark-icon>
                            <span i18n="navbar_direct">直链</span>
                        </button>
                    </div>
                    <label class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="fl-pf-allow-direct">
                        <span class="form-check-label" i18n="modal_performance_direct_des">
                            为此文件夹启用直链功能。
                        </span>
                        <span class="form-check-label" i18n="modal_performance_direct_des2">
                            启用后可在直链管理页面设置文件夹直链。
                        </span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal" i18n="model_btn_cancel">取消</button>
                <button type="button" class="btn btn-primary" i18n="model_btn_ok" onclick="FileListUI.confirmSettings();">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- FL Change Expiry Modal -->
<div class="modal" id="fl-expiry-modal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h4 class="modal-title" i18n="on_select_change_model">修改有效期</h4>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <select class="form-control" id="fl-expiry-select">
                        <option value="1" i18n-only="html" i18n="change_model_1day">1天</option>
                        <option value="7" i18n-only="html" i18n="change_model_7days">7天</option>
                        <option value="30" i18n-only="html" i18n="change_model_30days">30天</option>
                        <option value="99" i18n-only="html" i18n="change_model_permanent">永久</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal" i18n="model_btn_cancel">取消</button>
                <button type="button" class="btn btn-primary" i18n="model_btn_ok" onclick="FileListUI.confirmExpiry();">确定</button>
            </div>
        </div>
    </div>
</div>

<!-- FL Rename Modal -->
<div class="modal" id="fl-rename-modal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h4 class="modal-title" i18n="menu_rename">重命名</h4>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="fl-rename-input" i18n="menu_rename">新名称</label>
                    <input type="text" class="form-control" id="fl-rename-input" placeholder="请输入新名称">
                </div>
                <input type="hidden" id="fl-rename-type" value="">
                <input type="hidden" id="fl-rename-id" value="">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal" i18n="model_btn_cancel">取消</button>
                <button type="button" class="btn btn-primary" i18n="model_btn_ok" onclick="FileListUI.confirmRename();">确定</button>
